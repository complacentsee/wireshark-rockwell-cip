name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wireshark CLI (tshark) + Lua linter
        run: |
          sudo apt-get update
          # liblua5.3-dev provides the headers luarocks needs to build
          # the luacheck rock; without it luarocks errors out with
          # "Failed finding Lua header files".
          sudo apt-get install -y --no-install-recommends \
              tshark luarocks lua5.3 liblua5.3-dev
          sudo luarocks install luacheck

      - name: Lint Lua sources
        # Config is read from plugins/lua/.luacheckrc
        run: luacheck plugins/lua

      - name: Verify constants are in sync with Python source
        run: python3 tools/sync_constants.py --check

      - name: Run dissector tests
        # The harness skips cleanly when ROCKWELL_CIP_FIXTURES is unset
        # or empty (pcaps are intentionally not committed). The job
        # still verifies the dissector loads cleanly and the test
        # plumbing itself is healthy.
        run: |
          python3 -m pip install --user pytest
          python3 -m pytest tests/ -v

  proto-c-builds:
    runs-on: ubuntu-latest
    if: false   # enable when proto-c/ has actual source to compile
    steps:
      - uses: actions/checkout@v4
      - name: Install Wireshark headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              wireshark-dev cmake build-essential
      - name: Build out-of-tree plugin
        run: |
          cmake -S proto-c -B proto-c/build
          cmake --build proto-c/build
